<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FartCat - Phase 2</title>
	<meta name="description" content="Phase 2 de FartCat : help needed, red chaos, and next-level degen energy." />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Bungee:wght@400&family=Syne:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="index.css" />
	<style>
		.phase2-page {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 1rem 0;
		}

		html, body {
			overflow: hidden;
		}

		.phase2-panel {
			width: min(880px, 94vw);
			max-height: calc(100vh - 2rem);
			border: 1px solid rgba(255, 52, 52, 0.35);
			border-radius: 20px;
			background: linear-gradient(180deg, rgba(40, 0, 0, 0.96), rgba(8, 5, 5, 0.98));
			box-shadow: 0 0 42px rgba(255, 40, 40, 0.22), var(--shadow);
			overflow: hidden;
			position: relative;
		}

		.phase2-panel::before {
			content: "";
			position: absolute;
			inset: 0;
			background: radial-gradient(circle at top, rgba(255, 60, 60, 0.2), transparent 55%);
			pointer-events: none;
		}

		.phase2-hero {
			padding: clamp(1.2rem, 3vw, 2.2rem);
			display: grid;
			gap: 0.9rem;
			text-align: center;
		}

		.phase2-kicker {
			font-family: "Share Tech Mono", monospace;
			letter-spacing: 0.34em;
			text-transform: uppercase;
			color: #ff6b6b;
			font-size: 0.74rem;
			margin: 0;
		}

		.phase2-title {
			font-family: "Bungee", cursive;
			font-size: clamp(1.8rem, 5vw, 3.6rem);
			line-height: 0.96;
			margin: 0;
			color: #ffe9e9;
			text-shadow: 0 0 24px rgba(255, 52, 52, 0.55);
		}

		.phase2-copy {
			max-width: 56ch;
			margin: 0 auto;
			font-size: clamp(0.88rem, 1.8vw, 1.08rem);
			line-height: 1.5;
			color: #f0bcbc;
		}

		.phase2-cat-stage {
			position: relative;
			width: min(260px, 55vw);
			aspect-ratio: 1;
			margin: 0 auto;
			display: grid;
			place-items: center;
		}

		.phase2-cat {
			width: 100%;
			height: 100%;
			object-fit: cover;
			border-radius: 32px;
			border: 2px solid rgba(255, 74, 74, 0.35);
			box-shadow: 0 0 40px rgba(255, 52, 52, 0.24);
			animation: phase2Float 3.2s ease-in-out infinite;
		}

		.phase2-fart {
			position: absolute;
			bottom: 18%;
			right: -8%;
			font-size: clamp(3.5rem, 9vw, 6rem);
			color: #ff3c3c;
			text-shadow: 0 0 22px rgba(255, 52, 52, 0.9);
			animation: phase2Fart 1s ease-in-out infinite;
		}

		.phase2-actions {
			display: flex;
			justify-content: center;
			gap: 1rem;
			flex-wrap: wrap;
		}

		.phase2-note {
			margin: 0;
			font-family: "Share Tech Mono", monospace;
			text-transform: uppercase;
			letter-spacing: 0.16em;
			color: #ff9966;
			animation: phase2NotePulse 1.8s ease-in-out infinite;
		}

		@keyframes phase2PanelPulse {
			0%, 100% { box-shadow: 0 0 42px rgba(255, 140, 66, 0.28), var(--shadow); }
			50% { box-shadow: 0 0 52px rgba(255, 140, 66, 0.42), var(--shadow); }
		}

		@keyframes phase2GlowPulse {
			0%, 100% { opacity: 0.6; }
			50% { opacity: 1; }
		}

		@keyframes phase2KickerGlow {
			0%, 100% { text-shadow: 0 0 8px rgba(255, 140, 66, 0.4); }
			50% { text-shadow: 0 0 16px rgba(255, 140, 66, 0.8); }
		}

		@keyframes phase2TitlePulse {
			0%, 100% { 
				text-shadow: 0 0 24px rgba(255, 140, 66, 0.65), 0 0 12px rgba(255, 160, 80, 0.4);
			}
			50% { 
				text-shadow: 0 0 32px rgba(255, 140, 66, 0.85), 0 0 16px rgba(255, 160, 80, 0.6);
			}
		}

		@keyframes phase2CatBreathe {
			0%, 100% { transform: scale(1) rotate(-0.5deg); filter: saturate(1.1) brightness(1); }
			50% { transform: scale(1.04) rotate(0.5deg); filter: saturate(1.25) brightness(1.08); }
		}

		@keyframes phase2FartWiggle {
			0%, 100% { transform: translateX(0) rotate(0deg) scaleY(1); }
			25% { transform: translateX(4px) rotate(-8deg) scaleY(1.1); }
			50% { transform: translateX(0) rotate(0deg) scaleY(0.95); }
			75% { transform: translateX(-4px) rotate(8deg) scaleY(1.1); }
		}

		@keyframes phase2NotePulse {
			0%, 100% { opacity: 0.8; text-shadow: 0 0 8px rgba(255, 140, 66, 0.5); }
			50% { opacity: 1; text-shadow: 0 0 16px rgba(255, 140, 66, 0.9); }
		}
	</style>
</head>
<body>
	<div class="bg-noise" aria-hidden="true"></div>
	<main class="phase2-page container">
		<section class="phase2-panel">
			<div class="phase2-hero">
				<p class="phase2-kicker">PHASE 2 UNLOCKED</p>
				<h1 class="phase2-title">We need your help to unlock Phase 2</h1>
				<p class="phase2-copy">Our ATH is under pressure. The cat entered red alert, its fart turns red, and now we must push harder to reach the next level.</p>
				<div class="phase2-cat-stage" aria-hidden="true">
					<img class="phase2-cat" src="fartcat.jpg" alt="FartCat on red alert" />
					<div class="phase2-fart">💨</div>
				</div>
				<p class="phase2-note">Phase 2: help needed. ATH signal detected.</p>
				<div class="phase2-actions">
					<a class="btn" href="index.html">Return to base</a>
					<a class="btn btn-ghost" href="https://x.com/FartCatOfSol" target="_blank" rel="noreferrer">Call the pack</a>
				</div>
			</div>
		</section>
	</main>
</body>
</html>
